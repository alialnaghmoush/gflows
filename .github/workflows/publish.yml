# CI and publish for gflows: test, lint, then publish to npm and JSR.
#
# Setup:
# - JSR: Link this repo to the package in JSR settings (https://jsr.io/@alialnaghmoush/gflows).
# - npm: Add NPM_TOKEN (classic or granular publish token) in repo Secrets.
#
# On push to main: runs test + lint, then publish:all. Existing versions are skipped by both registries.

name: CI and Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    # Use "test" environment for PRs (optional; mainly useful if you have env secrets/vars)
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test

  publish:
    name: Publish (npm + JSR)
    runs-on: ubuntu-latest
    needs: test-and-lint

    # ✅ publish only on push to main (not on PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # ✅ this activates GitHub Environment protections (approvals, env secrets)
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Publish to npm and JSR
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun run scripts/publish.ts -- --force
        